<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôle N°3</title>
    <style>

        header{
            background:black;
            color:white;
            height:80px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            display:flex;
        }

        .navbar {
            
            width:220px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding:20px;
            background:#222;
        }

        .navbar div {
            font-size: x-large;
            font-weight: bold;
        }

        .navbar li{
            margin:20px 0;
        }

        
        footer{
            
            height:80px;
            background:#ece8b3;
            display:flex;
            justify-content:center;
            align-items:center;

        }

        *{

            margin: 0;
        }


        ul li a:hover {
            color: chocolate;
        }

        a {
            text-decoration: none;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        
        .welcome{
            font-size: 80px;
        }


        @keyframes animation {
            0% {background-color: chocolate;}
            50% {background-color: coral;}
            100% {background-color: #ece8b3;}
        }
        .namePage{
            background-color: chocolate;
            animation-name: animation;
            animation-duration: 7s;
        } 

        .namePage{
         opacity: 1;
         animation: scaleIn 6s ease forwards;
         animation-name: name;
         animation-delay:0s;
        }  

   
        @keyframes name{
            from{
                opacity:0;
            }
            to{
                opacity:1;
            }
        }

        
        .namePage {
            animation: slideDown 1s ease-out forwards;
        }

        
        @keyframes slideDown{
            from{
                opacity:0;
                transform:translateY(-100px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* Mobile Responsive */
@media screen and (max-width: 768px) {

    .container{
        flex-direction: column;
        
    }

    .navbar{
        width:100%;
        text-align:center;
    }

    .navbar div{
        font-size: 2rem;
        margin-bottom: 10px;
    }

    .welcome{
        font-size: 2.5rem;
        padding: 20px !important;
    }

    .namePage{
        margin: 0 10px !important;
    }

    .namePage{
        font-size: 2rem ;
        width:90%;
    }

    p{
        font-size: 1rem ;
        padding: 0 10px;
    }

    footer{
        height: auto;
        padding: 20px;
    }

    footer p{
        font-size: 0.9rem;
    }
}
        
    </style>
</head>
<body>
    <header style="background-color: black;color: white;">
       <h1>Contrôle N°3</h1>
        </header>

    <div class="container">
        <aside class="navbar">
            <div>NE</div>
            <ul style="list-style: none;">
                <li><a href="#">Accueil</a></li>
                <li><a href="#">About</a></li> 
                <li><a href="#">Contact</a></li>
            </ul>
            
        </aside>
    

    <main>
        
        <h2 class="welcome" style="text-align: center;color: rgb(192, 228, 28);padding: 40px;font-size:50px;">HELLO DEV_104 !</h2>

        <div class="namePage" style="border: 2px solid orange;margin:0px 30px">
            <h2 style="font-family: Arial, Helvetica, sans-serif;font-size:58px;text-align: center;padding: 20px;">ETTAOUIL NASREDDINE</h2>
        </div><br>
        
        <div style="text-align:center">
            <p style="margin-bottom:50px;font-size: larger;padding-bottom: 18px;">POLE: DIA/Developpement_Digital</p>
        </div>   
        
    </main>

    </div>

    <footer>
        <p style="text-align: center;">Copyright © NASREDDINE.ETTAOUIL 2026 All rights reserved</p>
    </footer>
</body>
</html>
