<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôle N°3</title>
    <style>

 *{
    margin:0;
    padding:0;
}

header{
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    display:flex;
}

.navbar{
    width:220px;
    background:#222;
    padding:20px;
    color:white;
}

.navbar div{
    font-size:30px;
    font-weight:bold;
    margin-bottom:20px;
}
        
.navbar li{
    margin:20px 0;
}

a{
    text-decoration:none;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

a:hover{
    color:chocolate;
}

main{
    flex:1;
    padding:40px;
    text-align:center;
}

.welcome{
    font-size:50px;
    color:rgb(192,228,28);
    padding:40px;
}

.namePage{
    border:2px solid orange;
    margin:0 30px;
    background:chocolate;
    animation:slideDown 3s ;
}

.namePage h2{
    font-family:Arial, Helvetica, sans-serif;
    font-size:58px;
    text-align:center;
    padding:20px;
}


footer{
    height:80px;
    background:#ece8b3;
    display:flex;
    justify-content:center;
    align-items:center;
}


@keyframes slideDown{
    from{
        opacity:0;
        transform:translateY(-100px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}


@media screen and (max-width: 768px) {

    
    .container{
        flex-direction: column;
    }

    .navbar{
        width: 100%;
        padding: 15px 0;
        text-align: center;
    }

    .navbar div{
        font-size: 40px;
        margin-bottom: 15px;
    }

    .navbar ul{
        display: flex;
        justify-content: center;
        gap: 25px;
    }

    .navbar li{
        margin: 0;
    }

    
    main{
        padding: 20px;
    }

    .welcome{
        font-size: 40px;
        padding: 20px 0;
    }

    .namePage{
        width: 95%;
        margin: 15px auto;
    }

    .namePage h2{
        font-size: 30px;
        line-height: 38px;
        padding: 15px;
        overflow-wrap: break-word;
    }

    p{
        font-size: 18px;
    }

    footer{
        height: 50px;
        padding: 15px;
    }

    footer p{
        font-size: 14px;
        text-align: center;
    }
}
        
    </style>
</head>
<body>
    <header style="background-color: black;color: white;">
       <h1>Contrôle N°3</h1>
        </header>

    <div class="container">
        <aside class="navbar">
            <div>NE</div>
            <ul style="list-style: none;">
                <li><a href="#">Accueil</a></li>
                <li><a href="#">About</a></li> 
                <li><a href="#">Contact</a></li>
            </ul>
            
        </aside>
    

    <main>
        
        <h2 class="welcome">HELLO DEV_104 !</h2>

        <div class="namePage">
            <h2>ETTAOUIL NASREDDINE</h2>
        </div><br>
        
        <div style="text-align:center">
            <p style="margin-bottom:50px;padding-bottom: 18px;">POLE: DIA/Developpement_Digital</p>
        </div>   
        
    </main>

    </div>

    <footer>
        <p style="text-align: center;">Copyright © NASREDDINE.ETTAOUIL 2026 All rights reserved</p>
    </footer>
</body>
</html>
